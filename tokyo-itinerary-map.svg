      .road2 { stroke: #e5d9bc; stroke-width: 2.4; opacity: .9; fill: none; }
      .rail { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .railShadow { fill: none; stroke: rgba(255,255,255,.9); stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; }
      .yamanote { stroke: #13a653; stroke-width: 10; stroke-dasharray: 24 12; }
