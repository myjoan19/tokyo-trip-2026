      .label { font-family: "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #2f2a22; font-weight: 800; paint-order: stroke; stroke: #fff; stroke-width: 5; stroke-linejoin: round; }
      .small { font-family: "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #3a3329; font-size: 24px; font-weight: 700; }
      .tiny { font-family: "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #554d42; font-size: 19px; font-weight: 650; }
      .box { fill: #fffdf5; fill-opacity: .78; stroke-width: 4; rx: 14; filter: url(#softShadow); }
      .star { fill: #f72735; font-size: 25px; font-weight: 900; }
      .title { font-family: "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #14110e; font-size: 62px; font-weight: 950; letter-spacing: 0; }
      .subtitle { font-family: "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #5e5547; font-size: 25px; font-weight: 700; }
      .dayText { font-family: "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #221f1a; font-size: 23px; font-weight: 800; }
      .daySmall { font-family: "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #4b443a; font-size: 20px; font-weight: 650; }
      .whiteText { font-family: "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; fill: #fff; font-weight: 900; paint-order: stroke; stroke: rgba(0,0,0,.42); stroke-width: 5; stroke-linejoin: round; }
