<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1320" viewBox="0 0 1600 1320" role="img" aria-labelledby="title desc">
  <title id="title">東京六天五夜行程景點地圖</title>
  <desc id="desc">2026/4/28 到 5/3 東京行程總覽，包含成田、鶯谷、上野、新宿晚餐、Alpen TOKYO、酔月、歌舞伎町、皇居、原宿、澀谷、淺草、台場、東京塔、富士山一日遊與回程動線。</desc>
